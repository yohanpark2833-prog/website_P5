function toggleMenu() {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
}

function updateHeader(bgUrl) {
  header.style.background = `linear-gradient(rgba(15, 23, 42, 0.5), rgba(15, 23, 42, 0.8)), url('${bgUrl}')`;
  header.style.backgroundSize = 'cover';
  header.style.backgroundPosition = 'center';
  header.style.backgroundAttachment = 'fixed';
}

function goHome() {
  title.innerText = 'Laozi';

  quoteBtn.style.display = 'inline-block';
  quoteBox.innerText = '';

  toggleMenu();
}

// showBio(), showTaoism() 함수 내의 innerHTML 내용은 사용자가 제공한 텍스트를 그대로 유지하되 
// 구조적인 클래스만 연결합니다.

function showBio() {
  title.innerText = 'Biography';
  subtitle.innerText = '';
  quoteBtn.style.display = 'none';
  quoteBox.innerText = '';
  updateHeader('https://miro.medium.com/v2/0*39ZwGGlQXCqX1n43.jpg');

  modeContent.innerHTML = `
  <div class="bio-content">
    
    <h2>Introduction</h2>
    <p>Laozi is seen as one of the most important thinkers in early Chinese history and is said to have written the <em>Daodejing</em>. His ideas are closely related to Daoism - it focused on staying in balance with the natural world, not forcing outcomes, and keeping both life and leadership simple.</p>
    <p>There are a few ideas that stand out</p>
    <ul>
      <li>Living in harmony with nature instead of trying to control everything</li>
      <li>Letting things happen naturally rather than forcing results</li>
      <li>Valuing simplicity over complexity, especially in government and daily life</li>
    </ul>
    <p>From a modern perspective, things are less clear. A lot of scholars don't agree with the idea that he was a historical person</p>
    <ul>
      <li>“Laozi” could represent multiple thinkers over time, not just one author</li>
      <li>The Doadejing could have been built gradually</li>
    </ul>
    <p>Because of that, Laozi exists in two ways at once - in stories, he's a real person with an identity, but in modern analysis, he's a symbol for a set of ideas.</p>

    <img class="content-img" src="https://images.squarespace-cdn.com/content/v1/58ed5944e6f2e1f4c44d9d2f/1513739008156-KTMD9FDDOA2Z4ZPD8CNQ/135076_240175.jpg" alt="Laozi by Nicholas Roerich">

    <h2>Biography</h2>
    <p>The main historical source for Laozi’s life comes from <em>Records of the Grand Historian</em> by Sima Qian, written during the Han dynasty. This text is the base for most of the stories about Laozi and created how people understand him:</p>
    <ul>
      <li>Laozi is said to have been present between 770-481 BCE, but there is no real proof of him being alive</li>
      <li>He was said to be “Li Er,” or an archivist whose job was to keep records and important knowledge</li>
      <li>Some stories talk about a meeting between Laozi and Confucious, which was seen as a symbolic moment showing the difference between their ideas</li>
      <li>He is said to have written the <em>Daodejing</em> before leaving for the west, and after that there are no records of what happened to him</li>
    </ul>
    <p>Over time, these stories were added through oral and religious ways, which turned “the name Laozi . . . to represent a certain type of sage rather than an individual” <a href="https://www.britannica.com/biography/Laozi" target="_blank" class="footnote-link">[3]</a>.</p>

    <h2>Modern academic perspectives on his ideas</h2>
    <p>Modern scholars study Laozi using different approaches like analyzing texts, studying artifacts, and looking at how his ideas developed over time. Using this information, “Modern scholars discount the possibility that the Daodejing was written by only one person” <a href="https://plato.stanford.edu/entries/laozi/" target="_blank" class="footnote-link">[1]</a>.</p>
    
    <p><strong>Historical existence of Laozi</strong><br>
    A lot of researchers think that Laozi is better understood as a symbol or a combined figure instead of a clear historical individual - this is also a doubt about many early biographies in Chinese history.</p>
    <p><strong>Formation of the Daodejing</strong><br>
    The daodejing is seen as a layered text that was built over time, not written at once. It likely came from collected sayings, teachings, and edits over different time periods. Discoveries like the Guodian bamboo slips show early versions of the text were different from each other <a href="https://brill.com/view/journals/jcph/34/4/article-p613_10.xml" target="_blank" class="footnote-link">[4]</a>.</p>
    <p><strong>Religious transformation and myth making</strong><br>
    Over time, Loazi's image changed a lot - he went from being seen as a philosopher to being seen as a divine/cosmic figure <a href="https://www.britannica.com/biography/Laozi" target="_blank" class="footnote-link">[3]</a>.</p>

    <h2>Loazi’s thought and intellectual influence</h2>
    <p>The philosophy linked to Laozi is built around the ideas of Dao (道) and De (德). Dao can be understood as the basic force or pattern behind everything in existence, something that can't really be fully defined. De is the way that Dao shows up in human life, especially in behavior that stays in tune with the natural order.</p>
    <p>A key idea in his thinking was its paradox - his idea suggests that things that are seen as weak or soft can actually be stronger than what looks powerful/rigid. This isn’t about morals, but about how reality works, and where opposites depend on each other.</p>
    <p>Some of the core ideas include</p>
    <ul>
      <li><strong>Wu Wei:</strong> Acting without forcing things, allowing actions to follow natural order instead of control</li>
      <li><strong>Ziran:</strong> Naturalness and spontaneity, existing without pressure or restriction. “Naturalness encompasses basic human needs, but these are to be distinguished from desire that fuels and inflates self-gratification” <a href="https://plato.stanford.edu/entries/laozi/" target="_blank" class="footnote-link">[1]</a>.</li>
      <li><strong>Paradoxical strength:</strong> Softness, patience, and humility can overcome force and domination</li>
    </ul>
    <p>These ideas ended up shaping political thought, ethical systems, medicine, and religious practice in East Asia.</p>

    <h2>Conclusion</h2>
    <p>Laozi has an interesting place in history - traditional accounts see him as the founder of Daoism, while modern scholars see him as a symbolic figure. His importance comes less from historical certainty and more from the influence of the ideas associated with him - his ideas “invite reflection on the very core of being,” which caused him to be the influence that he became <a href="https://plato.stanford.edu/entries/laozi/" target="_blank" class="footnote-link">[1]</a>.</p>
  </div>

<h2>References</h2>

<div style="font-size: 0.85rem; line-height: 1.8; color: #cbd5e1;">

<p style="text-indent: -20px; padding-left: 20px; margin-bottom: 12px;">

“Daoism.” <em>Encyclopaedia Britannica</em>, 20 Mar. 2024, <a href="https://www.britannica.com/topic/Daoism" target="_blank" style="color: #38bdf8; text-decoration: none;">www.britannica.com/topic/Daoism</a>. Accessed 15 Apr. 2026.

</p>

<p style="text-indent: -20px; padding-left: 20px; margin-bottom: 12px;">

Hansen, Chad. “Daoism.” <em>Stanford Encyclopedia of Philosophy</em>, Stanford University, 28 June 2020, <a href="https://plato.stanford.edu/entries/daoism/" target="_blank" style="color: #38bdf8; text-decoration: none;">plato.stanford.edu/entries/daoism/</a>. Accessed 15 Apr. 2026.

</p>

<p style="text-indent: -20px; padding-left: 20px; margin-bottom: 12px;">

“Laozi.” <em>Encyclopaedia Britannica</em>, 14 Feb. 2024, <a href="https://www.britannica.com/biography/Laozi" target="_blank" style="color: #38bdf8; text-decoration: none;">www.britannica.com/biography/Laozi</a>. Accessed 15 Apr. 2026.

</p>

<p style="text-indent: -20px; padding-left: 20px; margin-bottom: 12px;">

“Laozi (Lao-tzu).” <em>Internet Encyclopedia of Philosophy</em>, <a href="https://iep.utm.edu/laozi/" target="_blank" style="color: #38bdf8; text-decoration: none;">iep.utm.edu/laozi/</a>. Accessed 15 Apr. 2026.

</p>

<p style="text-indent: -20px; padding-left: 20px; margin-bottom: 12px;">

“Zhuangzi (Chuang-tzu).” <em>Internet Encyclopedia of Philosophy</em>, <a href="https://iep.utm.edu/zhuangzi/" target="_blank" style="color: #38bdf8; text-decoration: none;">iep.utm.edu/zhuangzi/</a>. Accessed 15 Apr. 2026.

</p>

</div>

</div>
  `;
  toggleMenu();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function generateQuote() {
  const quotes = [
    'Nature does not hurry, yet everything is accomplished. (Dao De Jing Ch. 36)',
    'He who knows does not speak. (Dao De Jing Ch. 56)',
    'To lead people, walk behind them. (Dao De Jing Ch. 66)',
    'Simplicity is the ultimate sophistication. (Dao De Jing Ch. 80)',
    'When I let go of what I am, I become what I might be. (Dao De Jing Ch. 22)',
    'There is no greater misfortune than not knowing what is enough. (Dao De Jing Ch. 46)',
    'The rivers and seas are king of a thousand valleys because they take the lower position. (Dao De Jing Ch. 66)',

  quoteBox.style.opacity = 0;

    quoteBox.innerText = quotes[Math.floor(Math.random() * quotes.length)];

  quoteBox.onclick = function() {

}
</script>
